version: 2
reconstruction:
  required: true
  owner: nimi-coding
  generation_inputs_ref: .nimi/config/spec-generation-inputs.yaml
  surface_taxonomy_ref: .nimi/contracts/surface-taxonomy.schema.yaml
  placement_contract_ref: .nimi/contracts/placement-contract.schema.yaml
  table_family_contract_ref: .nimi/contracts/table-family.schema.yaml
  domain_admission_contract_ref: .nimi/contracts/domain-admission.schema.yaml
  tracked_output_admission_contract_ref: .nimi/contracts/tracked-output-admission.schema.yaml
  spec_tree_model_ref: .nimi/contracts/surface-taxonomy.schema.yaml
  result_contract_ref: .nimi/contracts/spec-reconstruction-result.yaml
  trigger:
    bootstrap_state: bootstrap_only
  goals:
    - establish_project_canonical_rule_root
    - classify_every_spec_surface_before_generation
    - keep_product_authority_under_.nimi/spec
    - keep_package_methodology_under_nimi-coding
    - keep_generation_audit_state_under_.nimi/local/state/spec-generation
    - keep_audit_evidence_under_.nimi/local/audit
    - separate_product_authority_tables_from_support_registries
    - reject_generated_views_as_authority_inputs
    - reject_lifecycle_state_as_product_authority
    - accept_mixed_inputs_only_through_class_filtered_inputs
    - preserve_authority_explicitness
    - stop_on_authority_ambiguity
  target_root: .nimi/spec
  audit_root: .nimi/local/state/spec-generation/spec-generation-audit.yaml
  target_tree_shape:
    required_surface_classes:
      - product_authority
      - product_authority_table
      - thin_guidance
    optional_surface_classes:
      - host_projection_anchor
      - support_registry
    forbidden_surface_classes:
      - derived_view
      - spec_generation_state
      - audit_evidence_state
      - operational_local_artifact
      - nimicoding_managed_projection
      - candidate_roadmap
      - lifecycle_progress_state
      - methodology_authority
    minimal_required_outputs:
      - .nimi/spec/INDEX.md
      - .nimi/spec/project/kernel/index.md
      - .nimi/spec/project/kernel/core-rules.md
      - .nimi/spec/project/kernel/tables/rule-catalog.yaml
    minimum_generation_sequence:
      - classify_inputs
      - validate_placement
      - write_product_authority
      - write_product_authority_tables
      - write_thin_guidance
      - write_local_generation_audit
    skeleton_rules:
      - generate_minimal_kernel_before_optional_guides
      - declare_table_family_before_accepting_kernel_table
      - add_domain_guides_only_as_thin_guidance
      - treat_missing_rules_as_explicit_gaps_not_implicit_completion
      - treat_unclassified_files_as_fail_closed
  benchmark_acceptance:
    mode: semantic_and_structural_parity_when_blueprint_exists
    blueprint_is_optional: true
    benchmark_reference_ref: .nimi/local/state/spec-generation/blueprint-reference.yaml
  hard_constraints:
    - no_human_friendly_parallel_truth
    - no_silent_authority_inference
    - no_project_source_mutation_during_reconstruction
    - write_product_authority_outputs_only_under_.nimi/spec
    - write_file_level_generation_audit_under_.nimi/local/state/spec-generation
    - never_write_generation_audit_under_.nimi/spec/_meta
    - every_generated_canonical_file_requires_explicit_source_basis_and_unresolved_gap_tracking
    - every_input_file_requires_surface_class_before_generation
    - package_methodology_and_package_spec_must_not_be_promoted_into_.nimi/spec
    - host_projection_anchors_must_be_minimal_and_admitted
    - unresolved_ambiguity_must_remain_explicit
    - do_not_treat_repo_local_support_files_as_canonical_tree_completion
  lifecycle_contract_ref: .nimi/contracts/spec-reconstruction-result.yaml
  completion_gate:
    bootstrap_state_tree_state: canonical_tree_ready
    required_profile: surface_taxonomy_v1
    audit_contract_ref: .nimi/contracts/spec-generation-audit.schema.yaml
